<div class="contact-page">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-7">

                <!-- Capçalera -->
                <div class="text-center mb-5">
                    <i class="bi bi-envelope-fill contact-icon"></i>
                    <h1 class="page-title mt-3">Contacte</h1>
                    <p class="page-subtitle">Tens alguna pregunta? Envia'm un missatge.</p>
                </div>

                <!-- Confirmació d'enviament -->
                <div class="success-card p-4 text-center mb-4" *ngIf="submitted">
                    <i class="bi bi-check-circle-fill success-icon"></i>
                    <h4 class="mt-3">Missatge enviat!</h4>
                    <p>Gràcies pel teu missatge. Et respondré el més aviat possible.</p>
                    <button class="btn btn-outline-send mt-2" (click)="submitted = false">
                        Enviar un altre missatge
                    </button>
                </div>

                <!-- Formulari de contacte -->
                <div class="form-card p-4 p-md-5" *ngIf="!submitted">
                    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">

                        <div class="mb-4">
                            <label for="name" class="form-label">
                                Nom <span class="required">*</span>
                            </label>
                            <input
                              type="text"
                              id="name"
                              class="form-control custom-input"
                              formControlName="name"
                              placeholder="El teu nom"
                              [class.is-invalid]="contactForm.get('name')?.invalid && contactForm.get('name')?.touched">
                            <div class="invalid-feedback">El nom és obligatori.</div>
                        </div>

                        <div class="mb-4">
                            <label for="email" class="form-label">
                                Correu electrònic <span class="required">*</span>
                            </label>
                            <input
                              type="email"
                              id="email"
                              class="form-control custom-input"
                              formControlName="email"
                              placeholder="nom@exemple.com"
                              [class.is-invalid]="contactForm.get('email')?.invalid && contactForm.get('email')?.touched">
                            <div class="invalid-feedback">
                                <span *ngIf="contactForm.get('email')?.errors?.['required']">
                                    El correu és obligatori.
                                </span>
                                <span *ngIf="contactForm.get('email')?.errors?.['email']">
                                    Introdueix un correu vàlid.
                                </span>
                            </div>
                        </div>

                    <div class="mb-5">
                        <label for="message" class="form-label">
                            Missatge <span class="required">*</span>
                        </label>
                        <textarea
                            id="message"
                            class="form-control custom-input"
                            formControlName="message"
                            rows="5"
                            placeholder="Escriu el teu missatge aquí..."
                            [class.is-invalid]="contactForm.get('message')?.invalid && contactForm.get('message')?.touched">
                        </textarea>
                        <div class="invalid-feedback">El missatge és obligatori.</div>
                    </div>

                    <button
                      type="submit"
                      class="btn btn-send w-100"
                      [disabled]="contactForm.invalid">
                      <i class="bi bi-send-fill me-2"></i>Enviar missatge
                    </button>

                </form>
              </div>

            </div>
        </div>
    </div>
</div>
